<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>버킷그램 상담 도우미</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="left-panel">
        <div class="brand-block">
          <p class="eyebrow">AI COUNSELOR</p>
          <h1>버킷그램 상담 도우미</h1>
          <p class="subtitle">구매자/구매 예정자를 위한 제품 탐색형 상담</p>
        </div>

        <div class="panel-card">
          <button id="crawl-btn" class="ghost-btn">버킷그램 데이터 새로 수집</button>
        </div>

        <div class="panel-card small">
          <h2>AI 체형분석기</h2>
          <p class="analyzer-note">정면 전신 사진 1장과 기본 정보를 바탕으로 운동/식단 방향을 제안합니다.</p>
          <input id="body-image-input" type="file" accept="image/*" hidden />
          <div id="body-image-preview" class="attachment-preview hidden"></div>
          <div class="analyzer-grid">
            <input id="body-height" type="number" min="100" max="230" placeholder="키(cm)" />
            <input id="body-weight" type="number" min="20" max="250" placeholder="몸무게(kg)" />
            <input id="body-age" type="number" min="12" max="90" placeholder="나이" />
            <select id="body-gender">
              <option value="">성별(선택)</option>
              <option value="여성">여성</option>
              <option value="남성">남성</option>
            </select>
            <select id="body-activity">
              <option value="">활동량(선택)</option>
              <option value="거의 앉아서 생활">거의 앉아서 생활</option>
              <option value="가벼운 활동">가벼운 활동</option>
              <option value="중간 활동">중간 활동</option>
              <option value="높은 활동">높은 활동</option>
            </select>
            <input id="body-pain" type="text" placeholder="불편/통증 부위 (예: 허리, 무릎)" />
            <input id="body-goal" type="text" placeholder="목표 (예: 체지방 감량, 근육 증가)" />
          </div>
          <div class="analyzer-actions">
            <button id="body-upload-btn" class="ghost-btn" type="button">사진 선택</button>
            <button id="body-analyze-btn" class="primary-btn" type="button">체형 분석 시작</button>
          </div>
        </div>

        <div class="panel-card small">
          <h2>상담 팁</h2>
          <ul>
            <li>증상/고민과 예산을 함께 말해보세요.</li>
            <li>섭취 중인 영양제나 피부 타입을 알려주세요.</li>
            <li>원하면 후보 제품 3개 비교표로 답변합니다.</li>
          </ul>
        </div>
      </aside>

      <main class="chat-panel">
        <header class="chat-header">
          <div class="chat-header-row">
            <div>
              <p class="chip">실시간 상담</p>
              <h2>제품 추천 및 비교</h2>
            </div>
            <button type="button" id="new-chat-btn" class="new-chat-btn">새 대화</button>
          </div>
        </header>

        <section id="chat-log" class="chat-log"></section>

        <form id="chat-form" class="chat-form">
          <input id="image-input" type="file" accept="image/*" hidden />
          <div id="attachment-preview" class="attachment-preview hidden"></div>
          <button type="button" id="attach-btn" class="attach-btn">이미지 첨부</button>
          <textarea
            id="message-input"
            placeholder="예) 혈행관리와 눈 피로를 같이 챙기고 싶은데 어떤 제품이 맞을까요?"
            rows="1"
          ></textarea>
          <button type="submit" id="send-btn">전송</button>
        </form>
      </main>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
